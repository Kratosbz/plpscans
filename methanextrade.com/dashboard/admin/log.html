<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0a0b;
  --panel:     #111113;
  --border:    #1e1e22;
  --border2:   #2a2a30;
  --accent:    #00e5a0;
  --accent-dim: rgba(0,229,160,.08);
  --accent-glow: rgba(0,229,160,.18);
  --red:       #ff4d4d;
  --red-dim:   rgba(255,77,77,.1);
  --yellow:    #f0c040;
  --tx:        #e8e8ec;
  --tx2:       #72727e;
  --tx3:       #3a3a42;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--tx);
  font-family: var(--sans);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

body {
  display: grid;
  place-items: center;
  min-height: 100vh;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

/* ── BACKGROUND GRID ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  top: -40%;
  left: -20%;
  width: 70%;
  height: 80%;
  background: radial-gradient(ellipse, rgba(0,229,160,.04) 0%, transparent 65%);
  pointer-events: none;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 4px;
  position: relative;
  animation: cardIn .35s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* corner accents */
.card::before, .card::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--accent);
  border-style: solid;
}
.card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

/* ── HEADER ── */
.card-header {
  padding: 28px 32px 24px;
  border-bottom: 1px solid var(--border);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.brand-icon {
  width: 32px; height: 32px;
  border: 1px solid var(--accent);
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  background: var(--accent-dim);
  letter-spacing: -.5px;
}
.brand-name {
  font-family: var(--mono);
  font-size: 13px; font-weight: 600;
  color: var(--tx2);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.brand-sep {
  margin: 0 4px;
  color: var(--tx3);
}

.card-title {
  font-family: var(--mono);
  font-size: 20px; font-weight: 600;
  color: var(--tx);
  letter-spacing: -.4px;
  margin-bottom: 4px;
}
.card-sub {
  font-size: 12px;
  color: var(--tx2);
  font-family: var(--mono);
}
.card-sub span {
  color: var(--accent);
}

/* ── STATUS BADGE ── */
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  padding: 8px 12px;
  background: var(--accent-dim);
  border: 1px solid rgba(0,229,160,.15);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: .35; }
}

/* ── BODY ── */
.card-body {
  padding: 28px 32px;
}

/* ── FORM GROUPS ── */
.fg {
  margin-bottom: 18px;
}
.fl {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
}
.fl label {
  font-family: var(--mono);
  font-size: 10px; font-weight: 600;
  color: var(--tx2);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.fl-hint {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--tx3);
}

.input-wrap {
  position: relative;
}
.input-wrap svg {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  color: var(--tx3);
  width: 15px; height: 15px;
  pointer-events: none;
  transition: color .2s;
}
input {
  width: 100%;
  font-family: var(--mono);
  font-size: 13px;
  padding: 11px 14px 11px 40px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--tx);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
input::placeholder { color: var(--tx3); }
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
input:focus ~ svg, .input-wrap:focus-within svg {
  color: var(--accent);
}

/* show/hide password toggle */
.pw-toggle {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--tx3); cursor: pointer;
  font-family: var(--mono); font-size: 10px;
  font-weight: 600; letter-spacing: .04em;
  text-transform: uppercase;
  transition: color .15s;
  padding: 4px;
}
.pw-toggle:hover { color: var(--tx2); }

/* ── FIELD ERROR ── */
.field-err {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--red);
  margin-top: 5px;
  display: none;
}
.fg.has-error input { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }
.fg.has-error .field-err { display: block; }

/* ── SUBMIT BUTTON ── */
.submit-btn {
  width: 100%;
  font-family: var(--mono);
  font-size: 13px; font-weight: 600;
  padding: 13px;
  background: var(--accent);
  color: #030a07;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: .04em;
  transition: background .15s, transform .1s, box-shadow .15s;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  margin-top: 6px;
  position: relative;
  overflow: hidden;
}
.submit-btn:hover {
  background: #00ffb2;
  box-shadow: 0 0 24px rgba(0,229,160,.25);
}
.submit-btn:active { transform: scale(.98); }
.submit-btn:disabled {
  background: var(--tx3);
  color: var(--bg);
  cursor: not-allowed;
  box-shadow: none;
}

/* spinner */
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(3,10,7,.3);
  border-top-color: #030a07;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.submit-btn.loading .spinner { display: block; }
.submit-btn.loading .btn-text { opacity: .5; }

/* ── ALERT BOX ── */
.alert {
  display: none;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.6;
  padding: 12px 14px;
  border-radius: 3px;
  margin-bottom: 20px;
  border: 1px solid;
}
.alert.error {
  background: var(--red-dim);
  border-color: rgba(255,77,77,.25);
  color: var(--red);
}
.alert.warn {
  background: rgba(240,192,64,.08);
  border-color: rgba(240,192,64,.2);
  color: var(--yellow);
}
.alert.show { display: flex; gap: 10px; align-items: flex-start; }
.alert-icon { flex-shrink: 0; font-size: 13px; }
.alert-body { flex: 1; }
.alert-title { font-weight: 600; margin-bottom: 2px; }
.alert-msg { opacity: .8; }

/* ── LOCKOUT BAR ── */
.lockout-bar {
  display: none;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}
.lockout-fill {
  height: 100%;
  background: var(--red);
  border-radius: 2px;
  transition: width 1s linear;
}
.lockout-bar.show { display: block; }

/* ── FOOTER ── */
.card-footer {
  padding: 16px 32px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.footer-tag {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--tx3);
  display: flex; align-items: center; gap: 6px;
}
.footer-tag-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
}
.footer-link {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--tx3);
  text-decoration: none;
  transition: color .15s;
}
.footer-link:hover { color: var(--accent); }

/* ── SESSION BANNER (shown after login) ── */
.session-banner {
  display: none;
  text-align: center;
  padding: 20px 32px 28px;
}
.session-banner.show { display: block; }
.sb-check {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 1px solid rgba(0,229,160,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin: 0 auto 14px;
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.sb-title {
  font-family: var(--mono);
  font-size: 14px; font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}
.sb-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--tx2);
  margin-bottom: 16px;
}
.sb-token-label {
  font-family: var(--mono);
  font-size: 9px; font-weight: 600;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: .08em;
  text-align: left;
  margin-bottom: 5px;
}
.sb-token {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 10px 12px;
  color: var(--accent);
  word-break: break-all;
  text-align: left;
  line-height: 1.5;
  cursor: pointer;
  transition: border-color .15s;
}
.sb-token:hover { border-color: var(--accent); }
.sb-token-hint { font-size: 9px; color: var(--tx3); text-align: right; margin-top: 4px; font-family: var(--mono); }
.sb-go-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  padding: 10px 22px;
  background: var(--accent); color: #030a07;
  border: none; border-radius: 3px; cursor: pointer;
  margin-top: 16px;
  transition: background .15s, box-shadow .15s;
}
.sb-go-btn:hover { background: #00ffb2; box-shadow: 0 0 18px rgba(0,229,160,.25); }

/* ── ATTEMPTS INDICATOR ── */
.attempts-row {
  display: flex; gap: 5px; margin-top: 16px;
}
.attempt-pip {
  flex: 1; height: 3px; border-radius: 2px;
  background: var(--border2);
  transition: background .3s;
}
.attempt-pip.used { background: var(--red); }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="brand">
      <div class="brand-icon">AP</div>
      <div class="brand-name">Admin<span class="brand-sep">/</span>Panel</div>
    </div>

    <div class="card-title">Sign in</div>
    <div class="card-sub">Restricted access <span>— admin accounts only</span></div>

    <div class="status-row">
      <div class="status-dot"></div>
      <span>JWT · HS256 · Role-based access control</span>
    </div>
  </div>

  <!-- BODY -->
  <div class="card-body" id="card-body">

    <!-- Alert box -->
    <div class="alert error" id="alert">
      <div class="alert-icon">⚠</div>
      <div class="alert-body">
        <div class="alert-title" id="alert-title">Login failed</div>
        <div class="alert-msg" id="alert-msg"></div>
      </div>
    </div>

    <!-- Lockout countdown bar -->
    <div class="lockout-bar" id="lockout-bar">
      <div class="lockout-fill" id="lockout-fill"></div>
    </div>

    <!-- Email -->
    <div class="fg" id="fg-email">
      <div class="fl">
        <label for="email">Email address</label>
      </div>
      <div class="input-wrap">
        <input
          type="email"
          id="email"
          name="email"
          placeholder="admin@yourdomain.com"
          autocomplete="email"
          spellcheck="false"
          autofocus
        >
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="5" width="16" height="12" rx="2"/>
          <path d="M2 7l8 5 8-5"/>
        </svg>
      </div>
      <div class="field-err" id="email-err"></div>
    </div>

    <!-- Password -->
    <div class="fg" id="fg-password">
      <div class="fl">
        <label for="password">Password</label>
        <span class="fl-hint">Case-sensitive</span>
      </div>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••••••"
          autocomplete="current-password"
        >
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="5" y="9" width="10" height="8" rx="1.5"/>
          <path d="M8 9V6.5a2 2 0 014 0V9"/>
        </svg>
        <button class="pw-toggle" id="pw-toggle" type="button" onclick="togglePw()" tabindex="-1">show</button>
      </div>
      <div class="field-err" id="password-err"></div>
    </div>

    <!-- Attempts pips -->
    <div class="attempts-row" id="attempts-row" style="display:none">
      <div class="attempt-pip" id="pip-0"></div>
      <div class="attempt-pip" id="pip-1"></div>
      <div class="attempt-pip" id="pip-2"></div>
      <div class="attempt-pip" id="pip-3"></div>
      <div class="attempt-pip" id="pip-4"></div>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submit-btn" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <span class="btn-text" id="btn-text">Sign in to Admin Panel</span>
    </button>

  </div>

  <!-- SUCCESS BANNER (hidden until login) -->
  <div class="session-banner" id="session-banner">
    <div class="sb-check">✓</div>
    <div class="sb-title">Access granted</div>
    <div class="sb-sub">Authenticated as <strong id="sb-role-label">admin</strong> · Token stored in memory</div>
    <div class="sb-token-label">JWT (click to copy)</div>
    <div class="sb-token" id="sb-token" onclick="copyToken()"></div>
    <div class="sb-token-hint">Sent as Bearer token on every request</div>
    <button class="sb-go-btn" onclick="goToDashboard()">
      → Open Admin Dashboard
    </button>
  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <div class="footer-tag">
      <div class="footer-tag-dot"></div>
      Secure connection
    </div>
    <a href="#" class="footer-link">Need access? Contact IT</a>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG — point this at your real backend
// ─────────────────────────────────────────────────────────────
const API_BASE = 'https://scottlsh-render.onrender.com';
const LOGIN_ENDPOINT = `${API_BASE}/auth/admin/login`;

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
const MAX_ATTEMPTS   = 5;
const LOCKOUT_MS     = 30_000;   // 30 second client-side lockout after max attempts
let failedAttempts   = 0;
let lockedUntil      = 0;
let lockoutTimer     = null;
let sessionToken     = null;     // stored only in memory — never localStorage

// ─────────────────────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
  spinner.style.display = on ? 'block' : 'none';
  document.getElementById('btn-text').textContent = on ? 'Signing in…' : 'Sign in to Admin Panel';
}

function showAlert(title, msg, type = 'error') {
  const box = document.getElementById('alert');
  box.className = `alert ${type} show`;
  document.getElementById('alert-title').textContent = title;
  document.getElementById('alert-msg').textContent   = msg;
}

function hideAlert() {
  document.getElementById('alert').className = 'alert error';
}

function setFieldError(field, msg) {
  const fg = document.getElementById(`fg-${field}`);
  const err = document.getElementById(`${field}-err`);
  fg.classList.add('has-error');
  err.textContent = msg;
}

function clearFieldErrors() {
  ['email','password'].forEach(f => {
    document.getElementById(`fg-${f}`).classList.remove('has-error');
    document.getElementById(`${f}-err`).textContent = '';
  });
}

function updatePips() {
  const row = document.getElementById('attempts-row');
  row.style.display = failedAttempts > 0 ? 'flex' : 'none';
  for (let i = 0; i < 5; i++) {
    document.getElementById(`pip-${i}`).classList.toggle('used', i < failedAttempts);
  }
}

function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('pw-toggle');
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.textContent = showing ? 'show' : 'hide';
}

// ─────────────────────────────────────────────────────────────
//  CLIENT-SIDE LOCKOUT
// ─────────────────────────────────────────────────────────────
function startLockout() {
  lockedUntil = Date.now() + LOCKOUT_MS;
  const bar  = document.getElementById('lockout-bar');
  const fill = document.getElementById('lockout-fill');
  const btn  = document.getElementById('submit-btn');

  bar.classList.add('show');
  btn.disabled = true;

  function tick() {
    const remaining = lockedUntil - Date.now();
    if (remaining <= 0) {
      bar.classList.remove('show');
      fill.style.width = '0%';
      btn.disabled = false;
      document.getElementById('btn-text').textContent = 'Sign in to Admin Panel';
      failedAttempts = 0;
      updatePips();
      hideAlert();
      clearTimeout(lockoutTimer);
      return;
    }
    const pct = (remaining / LOCKOUT_MS) * 100;
    fill.style.width = pct + '%';
    const secs = Math.ceil(remaining / 1000);
    document.getElementById('btn-text').textContent = `Locked — try again in ${secs}s`;
    lockoutTimer = setTimeout(tick, 500);
  }
  tick();
}

// ─────────────────────────────────────────────────────────────
//  VALIDATION
// ─────────────────────────────────────────────────────────────
function validate(email, password) {
  let ok = true;
  clearFieldErrors();

  if (!email) {
    setFieldError('email', 'Email address is required');
    ok = false;
  } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    setFieldError('email', 'Enter a valid email address');
    ok = false;
  }

  if (!password) {
    setFieldError('password', 'Password is required');
    ok = false;
  } else if (password.length < 6) {
    setFieldError('password', 'Password must be at least 6 characters');
    ok = false;
  }

  return ok;
}

// ─────────────────────────────────────────────────────────────
//  MAIN LOGIN FUNCTION
// ─────────────────────────────────────────────────────────────
async function doLogin() {
  // Client-side lockout check
  if (Date.now() < lockedUntil) return;

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  hideAlert();
  if (!validate(email, password)) return;

  setLoading(true);

  try {
    const res = await fetch(LOGIN_ENDPOINT, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password }),
    });

    const data = await res.json();

    // ── SUCCESS ──────────────────────────────────────────
    if (res.ok && (data.token || data.accessToken)) {
      sessionToken = data.token || data.accessToken;
      onLoginSuccess(sessionToken, data);
      return;
    }

    // ── KNOWN ERROR CASES ────────────────────────────────
    failedAttempts++;
    updatePips();

    if (res.status === 403) {
      // User exists but is NOT an admin — matches backend: role !== 'admin'
      showAlert(
        'Access denied',
        'This account does not have admin privileges. Contact your administrator to request access.',
        'error'
      );
    } else if (res.status === 401) {
      // Wrong credentials
      const remaining = MAX_ATTEMPTS - failedAttempts;
      if (remaining <= 0) {
        showAlert('Too many failed attempts', 'Account temporarily locked. Wait 30 seconds before trying again.', 'error');
        startLockout();
      } else {
        showAlert(
          'Invalid credentials',
          `Email or password is incorrect. ${remaining} attempt${remaining !== 1 ? 's' : ''} remaining.`,
          'error'
        );
      }
    } else if (res.status === 429) {
      // Server-side rate limit (from the writeLimiter in your backend)
      showAlert(
        'Too many requests',
        data.error || 'You have been rate-limited by the server. Wait a few minutes and try again.',
        'warn'
      );
    } else {
      showAlert(
        'Login failed',
        data.error || data.message || `Server returned ${res.status}. Try again.`,
        'error'
      );
    }

  } catch (err) {
    // Network error / server down
    showAlert(
      'Cannot reach server',
      'Could not connect to the admin API. Check your connection or contact your server administrator.',
      'error'
    );
  } finally {
    setLoading(false);
  }
}

// ─────────────────────────────────────────────────────────────
//  SUCCESS STATE
// ─────────────────────────────────────────────────────────────
function onLoginSuccess(token, data) {
  // Decode the JWT payload (without verifying — verification is server-side)
  let payload = {};
  try {
    payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  } catch {}

  // Store token in sessionStorage (clears on tab close; not persistent like localStorage)
  // This matches the security posture of the backend (tokens can be blocklisted)
  sessionStorage.setItem('admin_token', token);
  sessionStorage.setItem('admin_role',  payload.role || 'admin');
  sessionStorage.setItem('admin_id',    payload.id   || '');

  // Show success UI
  document.getElementById('card-body').style.display = 'none';
  document.getElementById('session-banner').classList.add('show');

  document.getElementById('sb-role-label').textContent = payload.role || 'admin';

  // Show truncated token
  const tokenEl = document.getElementById('sb-token');
  tokenEl.textContent = token.length > 120
    ? token.slice(0, 60) + '…' + token.slice(-30)
    : token;
  tokenEl.dataset.full = token;
}

function copyToken() {
  const token = document.getElementById('sb-token').dataset.full || sessionToken;
  if (!token) return;
  navigator.clipboard?.writeText(token).catch(() => {});
  document.getElementById('sb-token-hint').textContent = '✓ Copied to clipboard';
  setTimeout(() => {
    document.getElementById('sb-token-hint').textContent = 'Sent as Bearer token on every request';
  }, 2000);
}

function goToDashboard() {
  // In a real app this would navigate to your admin dashboard
  // The token is in sessionStorage, the dashboard JS reads it from there
  window.location.href = 'admin.html'; // adjust to your actual route
}

// ─────────────────────────────────────────────────────────────
//  KEYBOARD SUPPORT
// ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ─────────────────────────────────────────────────────────────
//  CHECK EXISTING SESSION ON LOAD
//  If a valid token is still in sessionStorage, skip the form
// ─────────────────────────────────────────────────────────────
(function checkExistingSession() {
  const stored = sessionStorage.getItem('admin_token');
  if (!stored) return;

  // Decode and check expiry client-side
  try {
    const payload = JSON.parse(atob(stored.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if (payload.exp && payload.exp * 1000 > Date.now()) {
      // Token looks valid — skip to success state
      onLoginSuccess(stored, {});
    } else {
      sessionStorage.removeItem('admin_token');
    }
  } catch {
    sessionStorage.removeItem('admin_token');
  }
})();
</script>
